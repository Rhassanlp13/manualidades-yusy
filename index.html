<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Pilón | Granma</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="logo" onclick="location.reload()">
                <i class="fas fa-shopping-bag"></i> Shopping <span>Pilón</span>
            </div>
            <div class="search-bar">
                <input type="text" id="user-search" placeholder="¿Qué buscas en Pilón?" onkeyup="filtrarProductos()">
                <button><i class="fas fa-search"></i></button>
            </div>
            <div class="nav-right">
                <div class="cart-icon" onclick="toggleCart()">
                    <i class="fas fa-shopping-cart"></i>
                    <span id="cart-count">0</span>
                </div>
            </div>
        </nav>
    </header>

    <main class="container">
        <section class="hero">
            <div class="hero-content">
                <h1>Compra y Vende en Pilón</h1>
                <p>Tu mercado local, ahora digital.</p>
                <a href="https://wa.me/5356195243?text=Hola, quiero publicar un producto" class="btn-primary">Publicar mi producto</a>
            </div>
        </section>
        <div class="product-grid" id="product-list"></div>
    </main>

    <div id="cart-modal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="toggleCart()">&times;</span>
            <h2>Tu Carrito</h2>
            <div id="cart-items"></div>
            <div class="cart-total"><strong>Total: $<span id="total-price">0</span></strong></div>
            <button class="btn-checkout" onclick="checkout()">Finalizar por WhatsApp</button>
        </div>
    </div>

    <script src="js/productos.js"></script>
    <script src="js/script.js"></script>
</body>
</html>
