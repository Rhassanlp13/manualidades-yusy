<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Pilon | Tienda Online</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛍️</text></svg>">
</head>
<body>

    <header class="navbar">
        <div class="logo">SHOPPING <span>PILON</span></div>
        <button class="cart-btn" id="cart-btn" aria-label="Ver carrito">
            <i class="fas fa-shopping-bag"></i>
            <span class="cart-badge" id="cart-count">0</span>
        </button>
    </header>

    <section class="hero">
        <div class="hero-content">
            <p class="hero-subtitle">Bienvenido a</p>
            <h1>Tienda Online<br>en <em>Pilón</em></h1>
            <p class="hero-desc">Directo del vendedor a tu casa.</p>
            <a href="vender.html" class="btn-primary">
                <i class="fas fa-store"></i> Quiero vender aquí
            </a>
        </div>
    </section>

    <section class="section-title">
        <h2>Productos disponibles</h2>
        <p>Selecciona lo que quieres y confirma tu pedido por WhatsApp</p>
    </section>

    <main class="product-grid" id="grid" aria-label="Catálogo de productos"></main>

    <div id="toast-container"></div>

    <div id="cart-modal" class="modal-overlay" role="dialog" aria-modal="true" hidden>
        <div class="modal-box">
            <div class="modal-header">
                <h2><i class="fas fa-shopping-bag"></i> Tu Pedido</h2>
                <button class="modal-close" id="modal-close">&times;</button>
            </div>
            <div class="modal-body">
                <div id="cart-items"></div>
            </div>
            <div class="modal-footer">
                <div class="total-row">
                    <span>Total:</span>
                    <strong>$<span id="cart-total">0</span> CUP</strong>
                </div>
                <button class="btn-whatsapp" id="btn-whatsapp">
                    <i class="fab fa-whatsapp"></i> Confirmar por WhatsApp
                </button>
                <button class="btn-clear" id="btn-clear">
                    <i class="fas fa-trash"></i> Vaciar carrito
                </button>
            </div>
        </div>
    </div>

    <script src="js/carrito.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/productos.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
